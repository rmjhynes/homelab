---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adguard
  labels:
    app: adguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adguard
  template:
    metadata:
      labels:
        app: adguard
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      initContainers:
        - name: copy-config
          image: busybox
          command:
            - sh
            - -c
            - >-
              cp /config-template/AdGuardHome.yaml
              /opt/adguardhome/conf/AdGuardHome.yaml
          volumeMounts:
            - name: config-template
              mountPath: /config-template
            - name: conf
              mountPath: /opt/adguardhome/conf
      containers:
        - name: adguard
          # Pinned tag so imagePullPolicy defaults to IfNotPresent - the pod can
          # start from the cached image after a reboot without internet access
          image: adguard/adguardhome:v0.107.77
          volumeMounts:
            - mountPath: /opt/adguardhome/work
              name: work
            - mountPath: /opt/adguardhome/conf
              name: conf
      volumes:
        - name: config-template
          configMap:
            name: adguard-config
        - name: work
          hostPath:
            path: /var/lib/rancher/k3s/storage/adguard/work
            type: DirectoryOrCreate
        - name: conf
          hostPath:
            path: /var/lib/rancher/k3s/storage/adguard/conf
            type: DirectoryOrCreate
